services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gotteron-fan-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gotteron_fan}
      POSTGRES_USER: ${POSTGRES_USER:-gotteron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gotteron}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gotteron} -d ${POSTGRES_DB:-gotteron_fan}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: